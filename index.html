<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ASCEND">
<meta name="theme-color" content="#060810">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>ASCEND Protocol</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#060810;--bg2:#0a0e1a;--card:#0d1120;--card2:#111827;
  --border:#1a2035;--border2:#242f4a;
  --text:#e2e8f8;--muted:#4a5580;--muted2:#7a88b8;
  --gold:#f5c842;--gold2:#e8a800;
  --blue:#3b82f6;--cyan:#06b6d4;--green:#10b981;
  --orange:#f97316;--red:#ef4444;--purple:#8b5cf6;
  --growth:#06b6d4;--face:#a78bfa;--sport:#10b981;--hygiene:#64748b;
  --xp-bar:#3b82f6;
}
html,body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overscroll-behavior:none;font-size:16px}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}

/* ── HEADER ── */
#header{position:sticky;top:0;z-index:200;background:rgba(6,8,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border2)}
#header-top{display:flex;justify-content:space-between;align-items:center;padding:12px 16px 6px}
#logo{font-size:16px;font-weight:700;letter-spacing:4px;text-transform:uppercase;background:linear-gradient(90deg,var(--cyan),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#date-display{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--muted2)}
#xp-section{padding:6px 16px 10px}
#xp-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
#rank-label{font-size:13px;font-weight:700;letter-spacing:2px;color:var(--gold)}
#xp-label{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted2)}
#xp-bar-wrap{height:5px;background:var(--border2);border-radius:2px;overflow:hidden;position:relative}
#xp-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--blue),var(--cyan));transition:width 0.6s cubic-bezier(.4,0,.2,1);position:relative}
#xp-bar-fill::after{content:'';position:absolute;right:0;top:0;width:8px;height:100%;background:rgba(255,255,255,0.6);filter:blur(3px)}
#xp-bar-glow{position:absolute;top:-2px;height:9px;border-radius:4px;background:linear-gradient(90deg,transparent,rgba(6,182,212,0.3));pointer-events:none;transition:width 0.6s cubic-bezier(.4,0,.2,1)}
#stats-row{display:flex;gap:1px;background:var(--border);border-top:1px solid var(--border)}
.stat-box{flex:1;background:var(--bg2);padding:10px 6px;text-align:center}
.stat-val{font-family:'Share Tech Mono',monospace;font-size:17px;font-weight:700;line-height:1}
.stat-lbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:3px}

/* ── TABS ── */
#tabs{display:flex;overflow-x:auto;background:var(--bg2);border-bottom:1px solid var(--border2);scrollbar-width:none;padding:0 4px}
#tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:11px 14px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;min-width:54px}
.tab.active{border-bottom-color:var(--cyan)}
.tab-icon{font-size:18px;line-height:1}
.tab-lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);transition:color 0.2s}
.tab.active .tab-lbl{color:var(--cyan)}
.tab-xp{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted)}
.tab.active .tab-xp{color:var(--gold)}

/* ── PAGES ── */
.page{display:none;padding:14px 14px 110px;position:relative;z-index:1}
.page.active{display:block}

/* DAY HEADER */
.day-hero{padding:14px 0 18px}
.day-name{font-size:32px;font-weight:700;letter-spacing:-0.5px;line-height:1}
.day-sub{font-size:14px;color:var(--muted2);margin-top:4px;font-family:'Share Tech Mono',monospace}
.badge-today{font-size:10px;font-weight:700;letter-spacing:2px;padding:4px 10px;border-radius:2px;background:rgba(6,182,212,0.15);color:var(--cyan);border:1px solid rgba(6,182,212,0.3);text-transform:uppercase}

/* DAY PROGRESS */
.day-prog{background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:14px 16px;margin-bottom:14px;position:relative;overflow:hidden}
.day-prog::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(59,130,246,0.04),transparent);pointer-events:none}
.day-prog-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.day-prog-title{font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted2)}
.day-prog-nums{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--cyan)}
.day-prog-bar{height:6px;background:var(--border2);border-radius:3px;overflow:hidden;margin-bottom:10px}
.day-prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--green),var(--cyan));transition:width 0.5s ease}
.day-xp-earn{font-size:11px;color:var(--gold);font-family:'Share Tech Mono',monospace}
.day-complete{text-align:center;padding:8px 0 2px;font-size:13px;font-weight:700;letter-spacing:3px;color:var(--gold);text-transform:uppercase;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}

/* CAT PROGRESS */
.cat-progress-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.cat-prog-item{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.cat-prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.cat-prog-label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.cat-prog-pct{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted2)}
.cat-prog-bar{height:4px;background:var(--border2);border-radius:2px;overflow:hidden}
.cat-prog-fill{height:100%;border-radius:2px;transition:width 0.5s ease}
.cat-prog-done{font-size:10px;color:var(--muted);margin-top:4px;font-family:'Share Tech Mono',monospace}
.cpf-growth{background:linear-gradient(90deg,var(--growth),#0ea5e9)}
.cpf-face{background:linear-gradient(90deg,var(--face),#c084fc)}
.cpf-sport{background:linear-gradient(90deg,var(--sport),#34d399)}
.cpf-hygiene{background:linear-gradient(90deg,#64748b,#94a3b8)}

/* ── SECTION ── */
.sec{margin-bottom:20px}
.sec-header{display:flex;align-items:center;gap:8px;padding-bottom:10px;margin-bottom:10px;border-bottom:1px solid var(--border)}
.sec-icon{font-size:16px;line-height:1}
.sec-title{font-size:12px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted2);flex:1}
.sec-xp{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--gold)}
.sec-time{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--muted)}
.items{display:flex;flex-direction:column;gap:4px}

/* ── ITEM ── */
.item{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:border-color 0.15s}
.item.done{background:#0a1a12;border-color:#1a3a28}
.item.done .ititle{text-decoration:line-through;color:var(--muted)}
.item-top{display:flex;align-items:center;padding:13px 12px 13px 14px;gap:12px}
.item-chk-zone{display:flex;align-items:center;gap:12px;flex:1;min-width:0;cursor:pointer}
.item-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
.chk{width:26px;height:26px;border-radius:6px;flex-shrink:0;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;transition:all 0.2s;position:relative}
.item.done .chk{background:var(--green);border-color:var(--green)}
.chk::after{content:'✓';display:none;color:#000;font-size:15px;font-weight:900;line-height:1}
.item.done .chk::after{display:block}
.ititle{font-size:15px;font-weight:600;line-height:1.35}
.icat{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 6px;border-radius:2px;flex-shrink:0}
.ixp{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--gold);flex-shrink:0}
.iexp{font-size:15px;color:var(--muted);cursor:pointer;transition:transform 0.2s;flex-shrink:0;line-height:1;padding:4px}
.item.expanded .iexp{transform:rotate(180deg)}
.idesc{display:none;padding:0 14px 14px 52px;font-size:13px;color:var(--muted2);line-height:1.75;font-family:'Rajdhani',sans-serif;font-weight:400}
.item.expanded .idesc{display:block}
.item.priority-high{border-color:rgba(6,182,212,0.25)}
.item.priority-high .chk{border-color:rgba(6,182,212,0.4)}

/* ── SPORT CARD ── */
.sport-card{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:4px}
.sport-card.all-done{background:#0a1a12;border-color:#1a3a28}
.sport-hdr{padding:15px 14px;display:flex;align-items:center;gap:12px;cursor:pointer}
.sport-arr{font-size:14px;color:var(--muted);transition:transform 0.2s}
.sport-card.open .sport-arr{transform:rotate(180deg)}
.sport-bdy{display:none;border-top:1px solid var(--border);padding:0 14px 14px}
.sport-card.open .sport-bdy{display:block}
.ex{border-bottom:1px solid var(--border);overflow:hidden}
.ex:last-child{border-bottom:none}
.ex.done .exname{text-decoration:line-through;color:var(--muted)}
.ex-top{padding:12px 0;display:flex;align-items:center;gap:12px}
.ex-chk-z{display:flex;align-items:center;gap:12px;flex:1;cursor:pointer}
.exchk{width:20px;height:20px;border-radius:4px;flex-shrink:0;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.ex.done .exchk{background:var(--green);border-color:var(--green)}
.exchk::after{content:'✓';display:none;color:#000;font-size:11px;font-weight:900}
.ex.done .exchk::after{display:block}
.exbody{flex:1}
.exname{font-size:14px;font-weight:600;margin-bottom:4px;line-height:1.35}
.exmeta{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.exsets{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--green)}
.exrest{font-size:11px;color:var(--muted)}
.exprog{font-size:11px;color:var(--muted2);font-style:italic}
.ex-exp-btn{font-size:13px;color:var(--muted);cursor:pointer;transition:transform 0.2s;flex-shrink:0}
.ex.expanded .ex-exp-btn{transform:rotate(180deg)}
.exdetail{display:none;padding:0 0 12px 32px;font-size:12px;color:var(--muted2);line-height:1.7}
.ex.expanded .exdetail{display:block}

/* XP POPUP */
.xp-popup{position:fixed;pointer-events:none;font-family:'Share Tech Mono',monospace;font-size:15px;font-weight:700;color:var(--gold);z-index:999;animation:xpFloat 1.2s ease-out forwards}
@keyframes xpFloat{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}

/* RANK UP FLASH */
.rank-flash{position:fixed;inset:0;z-index:998;display:flex;align-items:center;justify-content:center;background:rgba(6,8,16,0.85);animation:flashIn 2.5s ease-out forwards;pointer-events:none}
@keyframes flashIn{0%{opacity:0}10%{opacity:1}80%{opacity:1}100%{opacity:0}}
.rank-flash-inner{text-align:center;animation:scaleIn 0.3s ease-out}
@keyframes scaleIn{0%{transform:scale(0.7)}100%{transform:scale(1)}}
.rank-flash-title{font-size:13px;letter-spacing:6px;text-transform:uppercase;color:var(--muted2);margin-bottom:8px}
.rank-flash-name{font-size:40px;font-weight:700;letter-spacing:2px;background:linear-gradient(90deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* HOME PAGE */
#home-hero{padding:24px 0 28px;text-align:center}
#home-rank-circle{width:120px;height:120px;border-radius:50%;border:2px solid var(--gold2);margin:0 auto 14px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(circle,rgba(245,200,66,0.08),transparent);position:relative}
#home-rank-circle::before{content:'';position:absolute;inset:-4px;border-radius:50%;border:1px solid rgba(245,200,66,0.2)}
#home-rank-emoji{font-size:36px;line-height:1}
#home-rank-name{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-top:3px}
#home-xp-big{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--muted2);margin-bottom:5px}
#home-total-xp{font-size:34px;font-weight:700;letter-spacing:-1px;color:var(--gold);line-height:1}
#home-streak{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:10px;font-size:14px;font-weight:600;color:var(--orange)}
.home-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:22px}
.home-stat-card{background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:16px;text-align:center}
.home-stat-icon{font-size:22px;margin-bottom:7px}
.home-stat-val{font-family:'Share Tech Mono',monospace;font-size:22px;font-weight:700;line-height:1}
.home-stat-lbl{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:4px}
.today-btn{display:block;width:100%;padding:16px;background:linear-gradient(90deg,rgba(59,130,246,0.2),rgba(6,182,212,0.2));border:1px solid rgba(6,182,212,0.4);border-radius:10px;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--cyan);cursor:pointer;text-align:center;margin-bottom:14px;transition:all 0.2s}
.today-btn:active{background:rgba(6,182,212,0.2);transform:scale(0.98)}
.ranks-section{margin-top:22px}
.ranks-title{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted2);margin-bottom:12px}
.rank-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:7px;margin-bottom:5px}
.rank-row.current-rank{border-color:var(--gold2);background:rgba(245,200,66,0.06)}
.rank-emoji{font-size:20px;width:30px;text-align:center}
.rank-info{flex:1}
.rank-name{font-size:15px;font-weight:700}
.rank-req{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted)}
.rank-check{color:var(--gold);font-size:16px}

/* ── BUDGET PAGE ── */
.budget-hero{padding:18px 0 20px}
.budget-hero-title{font-size:28px;font-weight:700;letter-spacing:-0.5px}
.budget-hero-sub{font-size:13px;color:var(--muted2);margin-top:4px;font-family:'Share Tech Mono',monospace}

.budget-overview{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.bov-card{background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:14px 10px;text-align:center}
.bov-val{font-family:'Share Tech Mono',monospace;font-size:20px;font-weight:700;line-height:1}
.bov-lbl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:4px}

.budget-bar-wrap{background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:14px 16px;margin-bottom:16px}
.budget-bar-label{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.budget-bar-title{font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted2)}
.budget-bar-pct{font-family:'Share Tech Mono',monospace;font-size:13px}
.budget-bar{height:10px;background:var(--border2);border-radius:5px;overflow:hidden}
.budget-bar-fill{height:100%;border-radius:5px;transition:width 0.5s ease}

.bsec{margin-bottom:20px}
.bsec-title{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--muted2);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}

.bitem{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:6px;transition:all 0.2s}
.bitem.bought{background:#0a1a12;border-color:#1a3a28}
.bitem-top{display:flex;align-items:center;padding:13px 14px;gap:12px;cursor:pointer}
.bchk{width:26px;height:26px;border-radius:6px;flex-shrink:0;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;transition:all 0.2s;position:relative}
.bitem.bought .bchk{background:var(--green);border-color:var(--green)}
.bchk::after{content:'✓';display:none;color:#000;font-size:15px;font-weight:900;line-height:1}
.bitem.bought .bchk::after{display:block}
.bitem-info{flex:1;min-width:0}
.bitem-name{font-size:15px;font-weight:600;line-height:1.3}
.bitem.bought .bitem-name{text-decoration:line-through;color:var(--muted)}
.bitem-where{font-size:11px;color:var(--muted2);margin-top:2px}
.bitem-price{font-family:'Share Tech Mono',monospace;font-size:14px;font-weight:700;flex-shrink:0}
.bitem-priority{font-size:9px;font-weight:700;letter-spacing:1.5px;padding:3px 7px;border-radius:2px;flex-shrink:0}
.bp-essentiel{background:rgba(6,182,212,0.12);color:var(--cyan);border:1px solid rgba(6,182,212,0.25)}
.bp-utile{background:rgba(245,200,66,0.1);color:var(--gold);border:1px solid rgba(245,200,66,0.2)}
.bp-optionnel{background:rgba(74,85,128,0.2);color:var(--muted2);border:1px solid var(--border)}
.bitem-detail{display:none;padding:0 14px 14px 52px;font-size:13px;color:var(--muted2);line-height:1.7}
.bitem.expanded .bitem-detail{display:block}
.bitem-exp{font-size:15px;color:var(--muted);transition:transform 0.2s;flex-shrink:0;padding:4px}
.bitem.expanded .bitem-exp{transform:rotate(180deg)}

.budget-note{background:rgba(245,200,66,0.06);border:1px solid rgba(245,200,66,0.2);border-radius:8px;padding:12px 14px;margin-bottom:16px;font-size:13px;color:var(--muted2);line-height:1.7}
.budget-note strong{color:var(--gold)}

/* CAT BADGES */
.cat-growth{background:rgba(6,182,212,0.12);color:var(--growth);border:1px solid rgba(6,182,212,0.25)}
.cat-face{background:rgba(167,139,250,0.12);color:var(--face);border:1px solid rgba(167,139,250,0.25)}
.cat-sport{background:rgba(16,185,129,0.12);color:var(--sport);border:1px solid rgba(16,185,129,0.25)}
.cat-hygiene{background:rgba(100,116,139,0.12);color:#94a3b8;border:1px solid rgba(100,116,139,0.25)}
.cat-nutrition{background:rgba(249,115,22,0.12);color:var(--orange);border:1px solid rgba(249,115,22,0.25)}

@media(max-width:400px){.day-name{font-size:28px}.tab-lbl{font-size:9px}.ititle{font-size:14px}.budget-hero-title{font-size:24px}}
</style>
</head>
<body>

<div id="header">
  <div id="header-top">
    <div id="logo">ASCEND</div>
    <div id="date-display"></div>
  </div>
  <div id="xp-section">
    <div id="xp-row">
      <span id="rank-label">RANG : —</span>
      <span id="xp-label">0 / 0 XP</span>
    </div>
    <div id="xp-bar-wrap">
      <div id="xp-bar-fill" style="width:0%"></div>
      <div id="xp-bar-glow" style="width:0%"></div>
    </div>
  </div>
  <div id="stats-row">
    <div class="stat-box">
      <div class="stat-val" id="stat-total-xp" style="color:var(--gold)">0</div>
      <div class="stat-lbl">XP Total</div>
    </div>
    <div class="stat-box">
      <div class="stat-val" id="stat-streak" style="color:var(--orange)">0🔥</div>
      <div class="stat-lbl">Streak</div>

const DAYS_FR=["Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi","Dimanche"];
const DAYS_SHORT=["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];
const SK=["J1","J2","J3","J4","J5","J6","J7"];
const HEBDO_DAYS=[2,4,6]; // Mercredi, Vendredi, Dimanche
const JS2I={1:0,2:1,3:2,4:3,5:4,6:5,0:6};

function todayI(){return JS2I[new Date().getDay()];}
function dayDate(di){const diff=di-todayI();const d=new Date();d.setDate(d.getDate()+diff);return d.toISOString().slice(0,10);}
function ikey(di,id){return dayDate(di)+"_"+id;}

// ── STATE ──
let ST={};
try{ST=JSON.parse(localStorage.getItem("asc_v2")||"{}");}catch{}
// Migrate from v1
try{const old=JSON.parse(localStorage.getItem("asc_v1")||"{}");if(Object.keys(old).length>0&&Object.keys(ST).length===0){ST=old;save();}}catch{}
function save(){try{localStorage.setItem("asc_v2",JSON.stringify(ST));}catch{}}
function isChk(di,id){return !!ST[ikey(di,id)];}
function isBought(id){return !!ST["budget_"+id];}

function toggleChk(di,id,xpVal,ev){
  const k=ikey(di,id);const kx=ikey(di,id+"_xp");
  ST[k]=!ST[k];
  if(ST[k]){ST[kx]=xpVal;if(ev)showXPPopup(ev,xpVal);}
  else{delete ST[kx];}
  save();updateGlobalXP();renderDay(di);renderTabs();updateHeader();
}

function toggleBought(id){
  const k="budget_"+id;
  ST[k]=!ST[k];
  save();renderBudget();
}

// ── XP CALC ──
function calcTotalXP(){
  let total=0;
  for(const k of Object.keys(ST)){if(k.endsWith("_xp"))total+=ST[k]||0;}
  return total;
}
function calcTodayXP(){
  const di=todayI();let total=0;
  const allItems=getAllItems(di);
  for(const it of allItems){const k=ikey(di,it.id+"_xp");if(ST[k])total+=ST[k];}
  const sk=SK[di];
  SPORT[sk].exs.forEach((_,i)=>{const k=ikey(di,`e_${sk}_${i}_xp`);if(ST[k])total+=ST[k];});
  return total;
}
function calcStreak(){
  let streak=0;const today=todayI();
  for(let offset=0;offset<30;offset++){
    const di=(today-offset+7)%7;
    const items=getAllItems(di);const sk=SK[di];
    const total=items.length+SPORT[sk].exs.length;
    if(total===0)break;
    const done=items.filter(it=>isChk(di,it.id)).length+SPORT[sk].exs.filter((_,i)=>isChk(di,`e_${sk}_${i}`)).length;
    if(done/total>=0.7)streak++;else break;
  }
  return streak;
}
function getAllItems(di){
  const base=[...MATIN_HYG,...MATIN_GROWTH,...JOURNEE,...SOIR_HYG,...SOIR_GROWTH,...COUCHER,...NUTRITION];
  if(HEBDO_DAYS.includes(di))return[...base,...HEBDO];
  return base;
}
function dayProg(di){
  const items=getAllItems(di);const sk=SK[di];
  const total=items.length+SPORT[sk].exs.length;
  const done=items.filter(it=>isChk(di,it.id)).length+SPORT[sk].exs.filter((_,i)=>isChk(di,`e_${sk}_${i}`)).length;
  const xpEarned=items.reduce((s,it)=>s+(ST[ikey(di,it.id+"_xp")]||0),0)+SPORT[sk].exs.reduce((s,_,i)=>s+(ST[ikey(di,`e_${sk}_${i}_xp`)]||0),0);
  return{done,total,pct:total>0?Math.round(done/total*100):0,xpEarned};
}

// ── CAT PROGRESS ──
function catProg(di){
  const allItems=getAllItems(di);const sk=SK[di];
  const cats={growth:{done:0,total:0},face:{done:0,total:0},sport:{done:0,total:0},hygiene:{done:0,total:0},nutrition:{done:0,total:0}};
  for(const it of allItems){
    const c=cats[it.cat];if(!c)continue;
    c.total++;if(isChk(di,it.id))c.done++;
  }
  SPORT[sk].exs.forEach((_,i)=>{cats.sport.total++;if(isChk(di,`e_${sk}_${i}`))cats.sport.done++;});
  return cats;
}
function catProgHTML(di){
  const cp=catProg(di);
  const defs=[
    {key:"growth",label:"Croissance",color:"cpf-growth",textColor:"var(--growth)"},
    {key:"face",label:"Visage",color:"cpf-face",textColor:"var(--face)"},
    {key:"sport",label:"Sport",color:"cpf-sport",textColor:"var(--sport)"},
    {key:"hygiene",label:"Hygiène",color:"cpf-hygiene",textColor:"#94a3b8"},
  ];
  return`<div class="cat-progress-grid">${defs.map(d=>{
    const{done,total}=cp[d.key];const pct=total>0?Math.round(done/total*100):0;
    return`<div class="cat-prog-item">
      <div class="cat-prog-top"><span class="cat-prog-label" style="color:${d.textColor}">${d.label}</span><span class="cat-prog-pct">${pct}%</span></div>
      <div class="cat-prog-bar"><div class="cat-prog-fill ${d.color}" style="width:${pct}%"></div></div>
      <div class="cat-prog-done">${done} / ${total}</div>
    </div>`;
  }).join("")}</div>`;
}

// ── XP POPUP ──
function showXPPopup(ev,xp){
  const el=document.createElement("div");el.className="xp-popup";el.textContent="+"+xp+" XP";
  const touch=ev.touches?ev.touches[0]:ev;
  el.style.left=(touch.clientX-20)+"px";el.style.top=(touch.clientY-30)+"px";
  document.body.appendChild(el);setTimeout(()=>el.remove(),1200);
}

// ── RANK UP ──
let lastRank=null;
function checkRankUp(xp){
  const r=getRank(xp);
  if(lastRank&&r.name!==lastRank.name){
    const flash=document.createElement("div");flash.className="rank-flash";
    flash.innerHTML=`<div class="rank-flash-inner"><div class="rank-flash-title">RANG ATTEINT</div><div class="rank-flash-name">${r.emoji} ${r.name}</div></div>`;
    document.body.appendChild(flash);setTimeout(()=>flash.remove(),2500);
  }
  lastRank=r;
}

// ── HEADER ──
function updateHeader(){
  const xp=calcTotalXP();const rank=getRank(xp);const next=getNextRank(xp);
  const level=getLevel(xp);const streak=calcStreak();const{pct}=dayProg(todayI());
  document.getElementById("rank-label").textContent="RANG : "+rank.name.toUpperCase();
  document.getElementById("rank-label").style.color=rank.color||"var(--gold)";
  if(next){
    const prog=xp-rank.minXP;const needed=next.minXP-rank.minXP;const pctBar=Math.round(prog/needed*100);
    document.getElementById("xp-label").textContent=xp+" / "+next.minXP+" XP";
    document.getElementById("xp-bar-fill").style.width=pctBar+"%";
    document.getElementById("xp-bar-glow").style.width=pctBar+"%";
  } else {
    document.getElementById("xp-label").textContent=xp+" XP — MAX";
    document.getElementById("xp-bar-fill").style.width="100%";
  }
  document.getElementById("stat-total-xp").textContent=xp;
  document.getElementById("stat-streak").textContent=streak+"🔥";
  document.getElementById("stat-today-pct").textContent=pct+"%";
  document.getElementById("stat-level").textContent="Nv."+level;
  checkRankUp(xp);
}
function updateGlobalXP(){updateHeader();}

function togExExp(di,sk,i){const k="exexp_"+di+"_"+sk+"_"+i;window[k]=!window[k];const el=document.getElementById("EX_"+di+"_"+sk+"_"+i);if(el)el.classList.toggle("expanded",window[k]);}
function togSport(di){window["sport_open_"+di]=!window["sport_open_"+di];renderDay(di);}
function toggleBoughtItem(id){toggleBought(id);}
function togBexp(id){const k="bexp_"+id;window[k]=!window[k];const el=document.getElementById("BI_"+id);if(el)el.classList.toggle("expanded",window[k]);}

// ── TABS ──
let activeTab="home";
function renderTabs(){
  const dayTabs=DAYS_SHORT.map((n,i)=>{
    const{pct}=dayProg(i);const isT=i===todayI();const sk=SK[i];
    return`<div class="tab${activeTab===String(i)?" active":""}" onclick="switchDay(${i})">
      <span class="tab-icon">${SPORT[sk].emoji}</span>
      <span class="tab-lbl">${n}${isT?'<span style="color:var(--cyan)">·</span>':""}</span>
      <span class="tab-xp">${pct}%</span>
    </div>`;
  }).join("");
  document.getElementById("tabs").innerHTML=
    `<div class="tab${activeTab==="home"?" active":""}" onclick="switchHome()"><span class="tab-icon">🏠</span><span class="tab-lbl">Accueil</span><span class="tab-xp">XP</span></div>`+
    dayTabs+
    `<div class="tab${activeTab==="budget"?" active":""}" onclick="switchBudget()"><span class="tab-icon">💰</span><span class="tab-lbl">Budget</span><span class="tab-xp">${BUDGET_ITEMS.filter(b=>isBought(b.id)).length}/${BUDGET_ITEMS.length}</span></div>`;
}
function switchDay(i){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("P_"+i).classList.add("active");
  activeTab=String(i);renderTabs();
  document.querySelectorAll(".tab")[i+1]?.scrollIntoView({block:"nearest",inline:"center",behavior:"smooth"});
}
function switchHome(){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("P_home").classList.add("active");
  activeTab="home";renderHome();renderTabs();
}
function switchBudget(){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("P_budget").classList.add("active");
  activeTab="budget";renderBudget();renderTabs();
}

// ── INIT ──
window.onload=function(){
  const d=new Date();
  const mo=["Jan","Fév","Mar","Avr","Mai","Jun","Jul","Aoû","Sep","Oct","Nov","Déc"];
  document.getElementById("date-display").textContent=DAYS_FR[todayI()]+" "+d.getDate()+" "+mo[d.getMonth()];
  const pg=document.getElementById("pages");
  const home=document.createElement("div");home.className="page active";home.id="P_home";pg.appendChild(home);
  for(let i=0;i<7;i++){
    const div=document.createElement("div");div.className="page";div.id="P_"+i;pg.appendChild(div);renderDay(i);
  }
  const budgetPage=document.createElement("div");budgetPage.className="page";budgetPage.id="P_budget";pg.appendChild(budgetPage);
  renderHome();renderBudget();renderTabs();updateHeader();
  lastRank=getRank(calcTotalXP());
};
</script>
